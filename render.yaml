services:
  - type: web
    name: organizador-entregas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: GOOGLE_CALENDAR_ID
        value: primary
