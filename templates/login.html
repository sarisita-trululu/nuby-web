<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  {% include "_psyche_background.html" %}
  <div class="cursor-glow" id="cursor-glow"></div>

  <main class="page auth-page">
    <section class="auth-card">
      <p class="eyebrow">Calendario Academico</p>
      <h1>Ingresa a tu espacio</h1>
      <p class="lead">Crea una cuenta o inicia sesion para guardar tu calendario academico personal.</p>

      {% if error %}
        <div class="message error">{{ error }}</div>
      {% endif %}

      {% if success %}
        <div class="message success">{{ success }}</div>
      {% endif %}

      <div class="auth-grid">
        <form action="/login" method="post" class="auth-form">
          <h2>Iniciar sesion</h2>
          <label class="input-label" for="login-username">Usuario</label>
          <input id="login-username" name="username" type="text" class="calendar-input" required>
          <label class="input-label" for="login-password">Contrasena</label>
          <input id="login-password" name="password" type="password" class="calendar-input" required>
          <button type="submit">Entrar</button>
        </form>

        <form action="/register" method="post" class="auth-form">
          <h2>Crear cuenta</h2>
          <label class="input-label" for="register-username">Usuario</label>
          <input id="register-username" name="username" type="text" class="calendar-input" required>
          <label class="input-label" for="register-password">Contrasena</label>
          <input id="register-password" name="password" type="password" class="calendar-input" required>
          <button type="submit">Crear cuenta</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const cursorGlow = document.getElementById("cursor-glow");
    const parallaxItems = Array.from(document.querySelectorAll(".parallax-item"));
    let targetX = 0;
    let targetY = 0;
    let currentX = 0;
    let currentY = 0;

    const animateParallax = () => {
      currentX += (targetX - currentX) * 0.085;
      currentY += (targetY - currentY) * 0.085;

      parallaxItems.forEach((item) => {
        const depth = Number(item.dataset.depth || 0.06);
        const rotateFactor = Number(item.dataset.rotate || 0);
        const offsetX = currentX * depth;
        const offsetY = currentY * depth;
        const rotation = currentX * rotateFactor;
        item.style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0) rotate(${rotation}deg)`;
      });

      window.requestAnimationFrame(animateParallax);
    };

    window.addEventListener("pointermove", (event) => {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;
      targetX = event.clientX - centerX;
      targetY = event.clientY - centerY;
      cursorGlow.style.opacity = "0.92";
      cursorGlow.style.transform = `translate(${event.clientX - 160}px, ${event.clientY - 160}px)`;
    });

    window.addEventListener("pointerleave", () => {
      targetX = 0;
      targetY = 0;
      cursorGlow.style.opacity = "0.58";
    });

    animateParallax();
  </script>
</body>
</html>
